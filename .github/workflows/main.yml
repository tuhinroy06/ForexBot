name: Run Forex Bot 24/7

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:        # Allows manual trigger too

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 6      # Slightly over 5 min to avoid overlap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test app
        run: python app.py 2>&1 & sleep 15 && echo "Bot ran for 15 seconds OK"

      - name: Run bot
        run: python app.py 2>&1 || true
